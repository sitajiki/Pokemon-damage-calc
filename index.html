.grid{display:grid;grid-template-columns:1fr 170px 1fr;gap:8px;align-items:start}
.panel{background:var(--card);border-radius:12px;padding:12px;border:1px solid var(--border)}
.ptitle{font-size:1em;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--hl)}

input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.sr{display:grid;grid-template-columns:34px 1fr 44px 44px 44px;gap:3px;align-items:center;margin-bottom:2px;font-size:.8em}
.sl{font-weight:700;font-size:.75em}
.sb{height:7px;border-radius:4px;background:#333;overflow:hidden}
.sf{height:100%;border-radius:4px;transition:width .3s}
.sv{text-align:center;font-weight:600;font-size:.78em}
.spi{width:100%;padding:2px;text-align:center;border-radius:4px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:.78em}
.tb{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.7em;font-weight:700;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.4);margin-right:2px}
.cb{display:flex;align-items:center;gap:5px;font-size:.8em;margin:2px 0}
.cb input{accent-color:var(--hl)}
.rbox{background:linear-gradient(135deg,#0f3460,#16213e);border-radius:12px;padding:12px;margin-top:8px;border:1px solid var(--hl);text-align:center}
.dnum{font-size:1.7em;font-weight:900;color:var(--hl)}
.dpct{font-size:.95em;font-weight:700;margin-top:3px}
.drng{font-size:.82em;color:var(--muted);margin-top:2px}
.deff{font-size:.82em;margin-top:3px;font-weight:600}
.dko{font-size:.8em;margin-top:3px;color:#7dd;font-weight:600}
.btn{display:block;width:100%;padding:9px;border:none;border-radius:8px;background:var(--hl);color:#fff;font-size:.9em;font-weight:700;cursor:pointer;margin-top:6px}
.btn:hover{opacity:.9}
.swp{background:var(--accent);color:var(--text);border:1px solid var(--border);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.78em;width:100%}
.swp:hover{background:var(--hl)}
.spt{font-size:.7em;color:var(--muted);text-align:right;margin-top:1px}
.ni{font-size:.7em;color:var(--muted);margin-top:1px}
.mi{font-size:.75em;color:var(--muted);margin-top:2px}
.sh{font-size:.8em;font-weight:700;color:var(--hl);margin:6px 0 3px;border-bottom:1px solid var(--border);padding-bottom:2px}
select option{background:var(--input)}
.rs{width:100%;padding:2px;border-radius:4px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:.76em}
.stat-hdr{display:grid;grid-template-columns:34px 1fr 44px 44px 44px;gap:3px;font-size:.65em;color:var(--muted);text-align:center;margin-bottom:2px;font-weight:600}
/* Autocomplete */
.ac-wrap{position:relative}
.ac-wrap input{width:100%;padding:5px 7px;border-radius:6px;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:.84em}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#0d1b2a;border:1px solid var(--border);border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;z-index:100;display:none}

.ac-item{padding:5px 8px;font-size:.82em;cursor:pointer;border-bottom:1px solid var(--border)}
.ac-item:hover,.ac-item.sel{background:var(--accent);color:#fff}
.ac-item .sub{font-size:.72em;color:var(--muted)}
.ac-item:hover .sub{color:#ccc}

// ===== AUTOCOMPLETE =====
function setupAC(inputId,listId,data,onSelect){
  const inp=document.getElementById(inputId),list=document.getElementById(listId);
  let sel=-1,items=[];
  function render(q){
    const lq=q.toLowerCase();
    items=data.filter(d=>d.name.toLowerCase().includes(lq)||d.name.includes(q)).slice(0,20);
    if(!q)items=data.slice(0,20);
    list.innerHTML=items.map((d,i)=>`<div class="ac-item${i===sel?' sel':''}" data-i="${i}">${d.name}${d.sub?'<span class="sub"> '+d.sub+'</span>':''}</div>`).join('');
    list.classList.toggle('show',items.length>0&&document.activeElement===inp);
  }
  inp.addEventListener('input',()=>{sel=-1;render(inp.value)});
  inp.addEventListener('focus',()=>{render(inp.value)});
  inp.addEventListener('blur',()=>{setTimeout(()=>list.classList.remove('show'),200)});
  inp.addEventListener('keydown',e=>{
    if(e.key==='ArrowDown'){e.preventDefault();sel=Math.min(sel+1,items.length-1);render(inp.value)}
    else if(e.key==='ArrowUp'){e.preventDefault();sel=Math.max(sel-1,0);render(inp.value)}
    else if(e.key==='Enter'){e.preventDefault();if(sel>=0){inp.value=items[sel].name}list.classList.remove('show');onSelect(inp.value)}
  });
  list.addEventListener('click',e=>{
    const it=e.target.closest('.ac-item');
    if(it){const i=+it.dataset.i;inp.value=items[i].name;list.classList.remove('show');onSelect(items[i].name)}
  });
  return{setValue(v){inp.value=v;onSelect(v)}};
}

    s.value='0';s.addEventListener('change',calc);
  });
  document.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',calc));
  document.getElementById('weather').addEventListener('change',calc);
  document.getElementById('terrain').addEventListener('change',calc);
  document.getElementById('fmt').addEventListener('change',calc);
 
  // Defaults
  document.getElementById('atk-nature').value='いじっぱり';
  document.getElementById('def-nature').value='ひかえめ';
  SP.atk={hp:0,atk:32,def:0,spa:0,spd:0,spe:0};
  SP.def={hp:0,atk:0,def:0,spa:32,spd:0,spe:0};
 
  acAtkPoke.setValue('ガブリアス');
  acDefPoke.setValue('アシレーヌ');
  acMove.setValue('じしん');
}
 
function onPC(side,name){
  const p=P[name];
  if(p){
    BS[side]=[...p.b];
    document.getElementById(side+'-types').innerHTML=p.t.map(t=>`<span class="tb" style="background:${t2c(t)}">${t}</span>`).join('');
    const asel=document.getElementById(side+'-ability');
    asel.innerHTML='';
    p.a.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;asel.appendChild(o)});
    asel.addEventListener('change',calc);
  } else if(name) {
    // Unknown pokemon - keep custom base stats, show editable
    document.getElementById(side+'-types').innerHTML='<span style="font-size:.7em;color:var(--muted)">カスタム (種族値を直接入力)</span>';
    const asel=document.getElementById(side+'-ability');
    if(!asel.options.length){asel.innerHTML='<option value="なし">なし</option>';}
  } else return;
  onNC(side);
  renderS(side);
  calc();
}
 
function renderS(side){
  const nat=NT[document.getElementById(side+'-nature').value]||[0,0,0,0,0];
  const c=document.getElementById(side+'-stats');
  const cols=['#4CAF50','#F44336','#FF9800','#2196F3','#9C27B0','#00BCD4'];
  let h='';
  SKK.forEach((k,i)=>{
    const b=BS[side][i],sp=SP[side][k]||0,v=cs(b,sp,nat,i,i===0);
    const pct=Math.min(b/200*100,100);
    let nm='';if(i>0&&nat[i-1]===1)nm=' <span style="color:#f44">&#8593;</span>';if(i>0&&nat[i-1]===-1)nm=' <span style="color:#48f">&#8595;</span>';
    h+=`<div class="sr"><div class="sl">${SK[i]}${nm}</div><div class="sb"><div class="sf" style="width:${pct}%;background:${cols[i]}"></div></div><div><input class="spi" type="number" min="1" max="255" value="${b}" onchange="onBS('${side}',${i},this.value)" title="種族値を直接編集"></div><div><input class="spi" type="number" min="0" max="32" value="${sp}" onchange="onSP('${side}','${k}',this.value)"></div><div class="sv">${v}</div></div>`;
  });
  c.innerHTML=h;
  const tot=Object.values(SP[side]).reduce((a,b)=>a+b,0);
  const el=document.getElementById(side+'-spt');
  el.textContent=`努力値合計: ${tot}/32`;el.style.color=tot>32?'#f44':'var(--muted)';
}
 
function onSP(side,k,v){SP[side][k]=Math.max(0,Math.min(32,parseInt(v)||0));renderS(side);calc()}
function onBS(side,i,v){BS[side][i]=Math.max(1,Math.min(255,parseInt(v)||1));renderS(side);calc()}
 
function onNC(side){
  const nat=NT[document.getElementById(side+'-nature').value]||[0,0,0,0,0];
  const info=document.getElementById(side+'-ni');
  const u=[],d=[];['攻撃','防御','特攻','特防','素早'].forEach((s,i)=>{if(nat[i]===1)u.push(s);if(nat[i]===-1)d.push(s)});
  info.textContent=u.length?`↑${u.join(',')} ↓${d.join(',')}`:'補正なし';
  renderS(side);
}
 
function onMC(name){
  const m=M[name];if(!m)return;
  document.getElementById('atk-mi').innerHTML=`<span class="tb" style="background:${t2c(m.t)};font-size:.68em">${m.t}</span> ${m.c} ${m.p>0?'威力'+m.p:''}${m.h?' ×'+m.h+'回':''}`;
  calc();
}
 
function calc(){
  const an=document.getElementById('atk-pokemon-input').value;
  const dn=document.getElementById('def-pokemon-input').value;
  const ap=P[an]||{t:["ノーマル"],b:BS.atk,a:["なし"]};
  const dp=P[dn]||{t:["ノーマル"],b:BS.def,a:["なし"]};
  if(!an||!dn){show('-','','','','');return}
  const mn=document.getElementById('atk-move-input').value;
  const mv=M[mn];
  if(!mv||mv.c==='変化'){show('-','変化技','','','');return}
  if(mv.p<=0){show('-','威力なし','','','');return}
 
  const an_=NT[document.getElementById('atk-nature').value]||[0,0,0,0,0];
  const dn_=NT[document.getElementById('def-nature').value]||[0,0,0,0,0];
  const as={},ds={};
  SKK.forEach((k,i)=>{as[k]=cs(BS.atk[i],SP.atk[k]||0,an_,i,i===0);ds[k]=cs(BS.def[i],SP.def[k]||0,dn_,i,i===0)});
 
  const phys=mv.c==='物理',psShock=!!mv.ps,crit=document.getElementById('atk-crit').checked;
  let A,D;
  if(phys){
    const ra=+document.getElementById('atk-rk-a').value,rd=+document.getElementById('def-rk-b').value;
    A=Math.floor(as.atk*rm(crit?Math.max(ra,0):ra));
    D=Math.floor(ds.def*rm(crit?Math.min(rd,0):rd));
  }else{
    const rc=+document.getElementById('atk-rk-c').value,rd=+document.getElementById('def-rk-d').value;
    A=Math.floor(as.spa*rm(crit?Math.max(rc,0):rc));
    D=psShock?Math.floor(ds.def*rm(crit?Math.min(+document.getElementById('def-rk-b').value,0):+document.getElementById('def-rk-b').value)):Math.floor(ds.spd*rm(crit?Math.min(rd,0):rd));
  }
 
  const ait=document.getElementById('atk-item').value,dit=document.getElementById('def-item').value;
  const aab=document.getElementById('atk-ability').value,dab=document.getElementById('def-ability').value;
 
  if(ait==='cb'&&phys)A=Math.floor(A*1.5);
  if(ait==='cs'&&!phys)A=Math.floor(A*1.5);
  if(dit==='av'&&!phys&&!psShock)D=Math.floor(D*1.5);
  if(dit==='ev')D=Math.floor(D*1.5);
  if(aab==='ちからもち'&&phys)A*=2;
  if(aab==='ヨガパワー'&&phys)A*=2;
  if(dab==='ファーコート'&&phys)D*=2;
 
  let pow=mv.p;
  if(mn==='はたきおとす'&&dit!=='none')pow=Math.floor(pow*1.5);
  if(aab==='テクニシャン'&&pow<=60)pow=Math.floor(pow*1.5);
  if(ait==='lo')pow=Math.floor(pow*5324/4096);
  if(ait.startsWith('t_')&&ait.slice(2)===mv.t)pow=Math.floor(pow*1.2);
  if(document.getElementById('atk-charge').checked&&mv.t==='でんき')pow=Math.floor(pow*1.5);
  if(aab==='かたいツメ'&&phys)pow=Math.floor(pow*1.3);
 
  let bd=Math.floor(Math.floor(Math.floor(22)*pow*A/D)/50+2);
 
  if(document.getElementById('spread').checked&&document.getElementById('fmt').value==='double')bd=Math.floor(bd*.75);
 
  const w=document.getElementById('weather').value;
  if(w==='sun'){if(mv.t==='ほのお')bd=Math.floor(bd*1.5);if(mv.t==='みず')bd=Math.floor(bd*.5)}
  if(w==='rain'){if(mv.t==='みず')bd=Math.floor(bd*1.5);if(mv.t==='ほのお')bd=Math.floor(bd*.5)}
  if(w==='sand'&&!phys&&dp.t.includes('いわ'))bd=Math.floor(bd*2/3);
  if(w==='snow'&&phys&&dp.t.includes('こおり'))bd=Math.floor(bd*2/3);
 
  if(crit)bd=Math.floor(bd*1.5);
 
  const tr=document.getElementById('terrain').value;
  if(tr==='electric'&&mv.t==='でんき')bd=Math.floor(bd*1.3);
  if(tr==='grassy'&&mv.t==='くさ')bd=Math.floor(bd*1.3);
  if(tr==='psychic'&&mv.t==='エスパー')bd=Math.floor(bd*1.3);
  if(tr==='misty'&&mv.t==='ドラゴン')bd=Math.floor(bd*.5);
 
  if(document.getElementById('atk-hh').checked)bd=Math.floor(bd*1.5);
 
  const dmgs=[];
  for(let r=85;r<=100;r++){
    let d=Math.floor(bd*r/100);
    let stab=1;if(ap.t.includes(mv.t))stab=1.5;
    if(aab==='てきおうりょく'&&stab>1)stab=2;
    if((aab==='スカイスキン'||aab==='フェアリースキン')&&stab===1)stab=1.2;
    d=Math.floor(d*stab);
    const ef=eff(mv.t,dp.t);
    d=Math.floor(d*ef);
    if(ait==='eb'&&ef>1)d=Math.floor(d*1.2);
    if(document.getElementById('atk-burn').checked&&phys&&aab!=='こんじょう')d=Math.floor(d*.5);
    if(aab==='こんじょう'&&document.getElementById('atk-burn').checked&&phys)d=Math.floor(d*1.5);
    if(!crit){
      const dbl=document.getElementById('fmt').value==='double';
      const sm=dbl?2/3:.5;
      if(phys&&(document.getElementById('def-ref').checked||document.getElementById('def-av').checked))d=Math.floor(d*sm);
      if(!phys&&!psShock&&(document.getElementById('def-ls').checked||document.getElementById('def-av').checked))d=Math.floor(d*sm);
    }
    if(document.getElementById('def-fg').checked)d=Math.floor(d*.75);
    if(dab==='あついしぼう'&&(mv.t==='ほのお'||mv.t==='こおり'))d=Math.floor(d*.5);
    if(dab==='マルチスケイル')d=Math.floor(d*.5);
    if((dab==='ハードロック'||dab==='フィルター')&&ef>1)d=Math.floor(d*.75);
    if(dab==='もふもふ'&&phys&&mv.t!=='ほのお')d=Math.floor(d*.5);
    if(dab==='こおりのりんぷん'&&!phys)d=Math.floor(d*.5);
    if(d<1&&ef>0)d=1;
    dmgs.push(d);
  }
 
  const hits=mv.h||1;
  const mi=Math.min(...dmgs)*hits,ma=Math.max(...dmgs)*hits;
  const hp=ds.hp;
  const mip=(mi/hp*100).toFixed(1),map=(ma/hp*100).toFixed(1);
 
  const ef=eff(mv.t,dp.t);
  let et='';
  if(ef===0)et='<span style="color:#888">効果なし</span>';
  else if(ef<1)et=`<span style="color:#48f">いまひとつ (×${ef})</span>`;
  else if(ef===1)et='<span style="color:#ccc">等倍</span>';
  else et=`<span style="color:#f44">効果抜群 (×${ef})</span>`;
 
  let ko='';
  if(ef===0)ko='効果がない';
  else if(mi>=hp)ko='確定1発';
  else if(ma>=hp){const c=dmgs.filter(d=>d*hits>=hp).length;ko=`乱数1発 (${(c/16*100).toFixed(1)}%)`}
  else if(mi*2>=hp)ko='確定2発';
  else if(ma*2>=hp)ko='乱数2発';
  else if(mi*3>=hp)ko='確定3発';
  else if(ma*3>=hp)ko='乱数3発';
  else ko=Math.ceil(hp/ma)+'発以上';
 
  show(`${mi} ~ ${ma}`,`HP ${hp} に対して`,`${mip}% ~ ${map}%`,et,ko);
}
 
function show(d,r,p,e,k){
  document.getElementById('rd').textContent=d;
  document.getElementById('rr').textContent=r;
  document.getElementById('rp').textContent=p;
  document.getElementById('re').innerHTML=e;
  document.getElementById('rk').textContent=k;
}
 
function swap(){
  const a=document.getElementById('atk-pokemon-input').value;
  const d=document.getElementById('def-pokemon-input').value;
  const an=document.getElementById('atk-nature').value;
  const dn=document.getElementById('def-nature').value;
  const asp={...SP.atk},dsp={...SP.def};
  const ai=document.getElementById('atk-item').value;
  const di=document.getElementById('def-item').value;
  SP.atk=dsp;SP.def=asp;
  document.getElementById('atk-nature').value=dn;
  document.getElementById('def-nature').value=an;
  document.getElementById('atk-item').value=di;
  document.getElementById('def-item').value=ai;
  acAtkPoke.setValue(d);acDefPoke.setValue(a);
}
 
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
